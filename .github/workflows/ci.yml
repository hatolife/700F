name: CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Linux build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify submodule initialization
        shell: bash
        run: |
          if git submodule status --recursive | grep -q '^[-+]' ; then
            echo 'One or more submodules are not initialized. Run "git submodule update --init --recursive".' >&2
            exit 1
          fi
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DF700F_ENABLE_CODEC2=OFF
      - name: Build
        run: cmake --build build --parallel 2
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Version check
        run: python3 tools/check_versions.py
      - name: Governance check
        run: python3 tools/check_governance.py

  windows:
    name: Windows build and test (optional)
    runs-on: windows-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DF700F_ENABLE_CODEC2=OFF
      - name: Build
        shell: bash
        run: cmake --build build --parallel 2
      - name: Test
        shell: bash
        run: ctest --test-dir build --output-on-failure
      - name: Version check
        shell: bash
        run: python3 tools/check_versions.py
      - name: Governance check
        shell: bash
        run: python3 tools/check_governance.py
