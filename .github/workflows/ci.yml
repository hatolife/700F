name: CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-codec2-off:
    name: Linux build and test (Codec2 OFF)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DF700F_ENABLE_CODEC2=OFF
      - name: Build
        run: cmake --build build --parallel 2
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Version check
        run: python3 tools/check_versions.py
      - name: Governance check
        run: python3 tools/check_governance.py

  linux-codec2-on:
    name: Linux build and test (Codec2 ON)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Codec2 ON local regression
        shell: bash
        run: bash ./tools/run_codec2_on_ci_local.sh

  windows:
    name: Windows build and test (Codec2 OFF, optional)
    runs-on: windows-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DF700F_ENABLE_CODEC2=OFF
      - name: Build
        shell: bash
        run: cmake --build build --parallel 2
      - name: Test
        shell: bash
        run: ctest --test-dir build --output-on-failure
      - name: Version check
        shell: bash
        run: python3 tools/check_versions.py
      - name: Governance check
        shell: bash
        run: python3 tools/check_governance.py
