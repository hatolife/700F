name: Governance

on:
  push:
  workflow_dispatch:

concurrency:
  group: governance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  governance:
    name: Governance checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Version manifest
        run: python3 tools/check_versions.py
      - name: Governance indexes
        run: python3 tools/check_governance.py
