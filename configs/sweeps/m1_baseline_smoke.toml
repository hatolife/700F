# ISSUE-0015 schema example. TOML parsing is deferred for v0.1.0; the C++
# config helper `make_m1_baseline_smoke_sweep_config()` mirrors this shape.

run_id_prefix = "m1-baseline-smoke"
output_directory = "reports/sweeps/m1-baseline-smoke"
export_audio = false
metric_ids = ["dummy.metric"]
seeds = [1]

[input.generated_tone]
sample_rate_hz = 8000
sample_count = 32
frequency_hz = 1000.0
amplitude = 0.25

[[modes]]
mode_id = "ssb_standard_3k"
skip_if_unavailable = true

[[modes]]
mode_id = "ssb_narrow_1k9"
skip_if_unavailable = true

[[modes]]
mode_id = "freedv700d_emulated"
skip_if_unavailable = true

[[modes]]
mode_id = "freedv700e_emulated"
skip_if_unavailable = true

[[modes]]
mode_id = "freedv700d_official"
skip_if_unavailable = true

[[modes]]
mode_id = "freedv700e_official"
skip_if_unavailable = true

[[channel_conditions]]
condition_id = "identity"
[[channel_conditions.channel_chain]]
channel_id = "identity"

[[channel_conditions]]
condition_id = "awgn-high"
[[channel_conditions.channel_chain]]
channel_id = "awgn"
snr_db = "24.0"

[[channel_conditions]]
condition_id = "awgn-low"
[[channel_conditions.channel_chain]]
channel_id = "awgn"
snr_db = "6.0"

[[channel_conditions]]
condition_id = "frequency-offset"
[[channel_conditions.channel_chain]]
channel_id = "frequency_offset"
freq_offset_hz = "25.0"

[[channel_conditions]]
condition_id = "simple-fading"
[[channel_conditions.channel_chain]]
channel_id = "simple_gain_fading"
min_gain_db = "-1.5"
max_gain_db = "1.5"
